name: Daily Stock Data Collection

on:
  schedule:
    - cron: '0 22 * * 1-5'   # UTC 22:00 = KST 07:00 (월~금)
  workflow_dispatch:           # 수동 실행

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_TOKEN }}
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run data collection
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          WATCH_SYMBOLS: ${{ secrets.WATCH_SYMBOLS }}
        run: python scripts/run_all.py

      - name: Purge old data (>180 days)
        run: python scripts/purge_old_data.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "data: $(date -u +%Y-%m-%d)"
          git push
